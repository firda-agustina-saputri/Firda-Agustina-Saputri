        .gallery {
            display: flex;
            flex-wrap: wrap;
        }

        .item {
            width: 25%;
            padding: 5px;
        }

        .item img {
            width: 100%;
            border: 2px solid black;
            transition: 0.3s;
        }

        .item img:hover {
            transform: scale(1.05);
            border-color: red;
        }

        @media (max-width: 768px) {
            .item {
                width: 50%;
            }
        }

        @media (max-width: 480px) {
            .item {
                width: 100%;
            }
        }
